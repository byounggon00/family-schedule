<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1f3a2e">
<title>우리집 스케줄</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Black+Han+Sans&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1c2620;--paper:#f3efe4;--card:#fbf8f0;--line:#d8d0bd;--forest:#1f3a2e;
    --sojung:#f0883e;--heejung:#3aa6c9;--mina:#b765c4;--byounggon:#5cab6b;
    --shadow:0 1px 0 rgba(0,0,0,.04), 0 8px 24px -16px rgba(31,58,46,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:'Gowun Dodum',system-ui,sans-serif;background:var(--paper);color:var(--ink);padding-bottom:90px;line-height:1.5;}
  header{background:var(--forest);color:#f3efe4;padding:12px 18px 12px;position:sticky;top:0;z-index:30;box-shadow:0 6px 18px -12px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .head-left{min-width:0;}
  .eyebrow{font-size:10px;letter-spacing:.28em;opacity:.6;margin:0 0 2px;display:flex;align-items:center;gap:7px;}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#7ea98a;display:inline-block;}
  .sync-dot.off{background:#c2683b;}
  .sync-dot.busy{background:#d8b24a;animation:pulse 1s infinite;}
  header h1{font-family:'Black Han Sans',sans-serif;font-weight:400;margin:0;font-size:21px;letter-spacing:-.5px;}
  .legend{display:flex;gap:12px;margin-top:7px;flex-wrap:wrap;font-size:11px;}
  .legend span{display:inline-flex;align-items:center;gap:5px;opacity:.92;}
  .profile{flex:0 0 auto;width:64px;height:64px;border-radius:50%;border:2px solid rgba(243,239,228,.5);background:rgba(243,239,228,.12);color:#f3efe4;font-size:26px;cursor:pointer;overflow:hidden;padding:0;display:flex;align-items:center;justify-content:center;}
  .profile img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
  .profile:active{transform:scale(.95);}
  @keyframes pulse{50%{opacity:.3;}}
  .legend span{display:inline-flex;align-items:center;gap:5px;opacity:.92;}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
  .d-s{background:var(--sojung);} .d-h{background:var(--heejung);} .d-m{background:var(--mina);} .d-b{background:var(--byounggon);}
  .days{display:flex;gap:7px;overflow-x:auto;padding:12px 16px;z-index:20;background:var(--paper);border-bottom:1px solid var(--line);scrollbar-width:none;}
  .days::-webkit-scrollbar{display:none;}
  .day-pill{flex:0 0 auto;border:1px solid var(--line);background:var(--card);border-radius:999px;padding:8px 15px;font-size:14px;color:var(--ink);cursor:pointer;transition:.15s;font-family:'Gowun Dodum';}
  .day-pill.active{background:var(--forest);color:#f3efe4;border-color:var(--forest);}
  .day-pill .wk{font-size:10px;opacity:.55;margin-left:3px;}
  .day-pill.active .wk{opacity:.7;}
  main{padding:16px 16px 0;max-width:680px;margin:0 auto;}
  .day-title{font-family:'Gowun Batang',serif;font-weight:700;font-size:20px;margin:4px 2px 16px;display:flex;align-items:baseline;gap:8px;}
  .day-title .en{font-family:'Gowun Dodum';font-size:12px;letter-spacing:.2em;color:#9a917c;}
  .dtitle-date{font-family:'Gowun Dodum';font-size:14px;font-weight:400;color:#9a917c;}
  .timeline{position:relative;}
  .tl-row{display:flex;gap:12px;align-items:flex-start;}
  .tl-time{flex:0 0 58px;text-align:right;padding-top:11px;font-weight:700;font-size:13px;color:var(--forest);font-variant-numeric:tabular-nums;}
  .tl-time .end{display:block;font-size:11px;font-weight:400;color:#9a917c;}
  .tl-line{flex:0 0 14px;position:relative;align-self:stretch;}
  .tl-line::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:2px;background:var(--line);}
  .tl-row:first-child .tl-line::before{top:14px;}
  .tl-row:last-child .tl-line::before{bottom:auto;height:16px;}
  .tl-dot{position:absolute;left:1px;top:14px;width:12px;height:12px;border-radius:50%;border:2px solid var(--paper);z-index:1;}
  .dot-s{background:var(--sojung);} .dot-h{background:var(--heejung);} .dot-m{background:var(--mina);} .dot-b{background:var(--byounggon);}
  .tl-body{flex:1;padding-bottom:12px;min-width:0;}
  .card{background:var(--card);border:1px solid var(--line);border-left-width:4px;border-radius:12px;padding:11px 12px;box-shadow:var(--shadow);position:relative;}
  .card.s{border-left-color:var(--sojung);}
  .card.h{border-left-color:var(--heejung);}
  .card.m{border-left-color:var(--mina);}
  .card.b{border-left-color:var(--byounggon);}
  .who{font-size:11px;font-weight:700;color:#fff;padding:2px 9px;border-radius:999px;display:inline-block;margin-bottom:5px;}
  .who-s{background:var(--sojung);} .who-h{background:var(--heejung);} .who-m{background:var(--mina);} .who-b{background:var(--byounggon);}
  .card .act{font-size:15px;}
  .loc-row{display:flex;align-items:center;gap:6px;margin-top:8px;border-top:1px dashed var(--line);padding-top:8px;}
  .pin{flex:0 0 auto;color:#9a917c;font-size:13px;}
  .loc-input{flex:1;border:none;background:transparent;font-family:'Gowun Dodum';font-size:13px;color:var(--ink);padding:3px 2px;border-bottom:1px solid transparent;transition:.15s;min-width:0;}
  .loc-input::placeholder{color:#bdb6a3;}
  .loc-input:focus{outline:none;border-bottom-color:var(--forest);}
  .del-btn{position:absolute;top:7px;right:7px;border:none;background:transparent;color:#cbc3af;font-size:18px;line-height:1;cursor:pointer;padding:4px;}
  .del-btn:active{color:var(--sojung);}
  .empty{color:#bdb6a3;font-size:14px;padding:20px 2px;text-align:center;}
  /* 빈 시간 배너 */
  .free-banner{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:14px;box-shadow:var(--shadow);}
  .free-title{font-size:13px;font-weight:700;color:var(--forest);margin-bottom:10px;}
  .free-block{margin-bottom:11px;}
  .free-block:last-child{margin-bottom:0;}
  .free-who{font-size:11px;font-weight:700;color:#fff;padding:2px 9px;border-radius:999px;display:inline-block;margin-bottom:6px;}
  .free-gaps{display:flex;flex-direction:column;gap:5px;}
  .free-gap{background:#ece7da;border-radius:8px;padding:6px 9px;display:flex;flex-direction:column;gap:1px;}
  .fg-time{font-size:12px;font-weight:700;color:#5a5444;font-variant-numeric:tabular-nums;}
  .fg-time em{font-style:normal;color:#9a8f78;font-weight:400;margin-left:4px;}
  .fg-between{font-size:11px;color:#8a8170;}
  .free-none{font-size:12px;color:#bdb6a3;display:block;}
  .now-status{display:block;font-size:12px;color:var(--forest);font-weight:700;margin-bottom:6px;}
  .banner-clock{float:right;font-size:11px;font-weight:400;color:#9a917c;}
  .free-gap.gap-now{background:#dfe9df;border:1px solid #7ea98a;}
  .fg-time b{color:#2f7d4f;margin-left:4px;}
  /* 주간 보드 (가로 7칸) */
  .board{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 8px;scrollbar-width:thin;-webkit-overflow-scrolling:touch;}
  .board::-webkit-scrollbar{height:6px;}
  .board::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
  .bcol{flex:0 0 130px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px;display:flex;flex-direction:column;}
  .bcol.today{border-color:var(--forest);box-shadow:0 0 0 1px var(--forest);}
  .bcol-h{text-align:center;font-weight:700;font-size:13px;padding:4px 0 8px;border-bottom:1px solid var(--line);margin-bottom:8px;}
  .bcol-h .en{display:block;font-size:9px;letter-spacing:.15em;color:#9a917c;font-weight:400;}
  .bcol-h .bdate{font-size:11px;color:#9a917c;font-weight:400;}
  .bcol.today .bcol-h .bdate{color:var(--forest);}
  .bcol.today .bcol-h{color:var(--forest);}
  .bitem{border-radius:8px;padding:6px 7px;margin-bottom:6px;cursor:pointer;border-left:3px solid;background:var(--paper);}
  .bitem.s{border-left-color:var(--sojung);}
  .bitem.h{border-left-color:var(--heejung);}
  .bitem.m{border-left-color:var(--mina);}
  .bitem.b{border-left-color:var(--byounggon);}
  .bitem .bt{font-size:11px;font-weight:700;color:var(--forest);font-variant-numeric:tabular-nums;}
  .bitem .bn{font-size:10px;color:#fff;padding:1px 6px;border-radius:999px;display:inline-block;margin:2px 0;}
  .bn.s{background:var(--sojung);} .bn.h{background:var(--heejung);} .bn.m{background:var(--mina);} .bn.b{background:var(--byounggon);}
  .bitem .ba{font-size:12px;line-height:1.35;}
  .bitem .bl{font-size:10px;color:#9a917c;margin-top:2px;}
  .bitem .bhw{font-size:10px;color:#5a7a3a;margin-top:3px;background:#eef3e6;border-radius:5px;padding:3px 5px;line-height:1.3;}
  .hw-row{font-size:12px;color:#5a7a3a;margin-top:8px;background:#eef3e6;border-radius:7px;padding:6px 8px;line-height:1.4;}
  /* 숙제 탭 */
  .hw-pill.active{background:#5a7a3a!important;border-color:#5a7a3a!important;}
  .hw-list{display:flex;flex-direction:column;gap:9px;}
  .hw-card{background:var(--card);border:1px solid var(--line);border-left:4px solid;border-radius:11px;padding:11px 13px;cursor:pointer;box-shadow:var(--shadow);}
  .hw-card.s{border-left-color:var(--sojung);}
  .hw-card.h{border-left-color:var(--heejung);}
  .hw-card.m{border-left-color:var(--mina);}
  .hw-card.b{border-left-color:var(--byounggon);}
  .hw-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
  .hw-meta{font-size:12px;color:#9a917c;}
  .hw-text{font-size:14px;color:var(--ink);line-height:1.45;}
  .bcol-empty{font-size:11px;color:#cbc3af;text-align:center;padding:8px 0;}
  .board-hint{font-size:11px;color:#9a917c;text-align:center;margin:2px 0 8px;}
  /* 시간축 격자 */
  .grid-wrap{overflow:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:12px;background:var(--card);max-height:calc(100vh - 150px);}
  .grid{display:flex;min-width:max-content;position:relative;}
  .grid-times{flex:0 0 30px;position:sticky;left:0;z-index:5;background:var(--card);border-right:1px solid var(--line);}
  .gt-head2{height:58px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--card);z-index:6;}
  .gt-head3{height:24px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--card);z-index:6;}
  .day-grid .grid{min-width:0;width:100%;}
  .day-grid .gcol{flex:1;}
  .day-grid .lane-head{top:24px;}
  .gt-hour{font-size:11px;color:#9a917c;text-align:center;padding-top:2px;box-sizing:border-box;border-top:1px solid var(--line);font-variant-numeric:tabular-nums;font-weight:700;}
  .gcol{flex:0 0 150px;border-right:1px solid var(--line);position:relative;}
  .gcol:last-child{border-right:none;}
  .gcol.today{background:#fcecea;}
  .gcol-h{height:34px;display:flex;align-items:center;justify-content:center;gap:5px;font-size:14px;font-weight:700;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--card);z-index:4;}
  .gcol.today .gcol-h{background:#fcecea;}
  .gcol-h.sat{color:#2f6fd0;}
  .gcol-h.sun{color:#e0463e;}
  .day-title.sat{color:#2f6fd0;}
  .day-title.sun{color:#e0463e;}
  .gcol-h .gd{font-size:11px;color:#9a917c;font-weight:400;}
  .lane-head{height:24px;display:flex;border-bottom:1px solid var(--line);position:sticky;top:34px;background:var(--card);z-index:4;}
  .lane-head .lh{flex:1;text-align:center;font-size:10px;font-weight:700;line-height:24px;color:#fff;}
  .lane-head .lh.s{background:var(--sojung);}
  .lane-head .lh.h{background:var(--heejung);}
  .gcol-body{position:relative;}
  .gline{position:absolute;left:0;right:0;border-top:1px solid #ede8db;}
  .lane-div{position:absolute;top:0;bottom:0;left:50%;border-left:1px dashed var(--line);}
  .gitem{position:absolute;border-radius:6px;padding:3px 5px;overflow:hidden;cursor:pointer;color:#fff;box-sizing:border-box;line-height:1.2;box-shadow:0 1px 3px -1px rgba(0,0,0,.25);z-index:2;}
  .gitem.s{background:var(--sojung);}
  .gitem.h{background:var(--heejung);}
  .gitem.m{background:var(--mina);}
  .gitem.b{background:var(--byounggon);}
  .gitem.pu{outline:2.5px solid #ffd23f;outline-offset:-2px;box-shadow:0 0 0 1px #e0463e,0 1px 3px -1px rgba(0,0,0,.3);}
  .gi-car{display:inline-block;background:#ffd23f;color:#7a3a00;font-size:9px;font-weight:800;border-radius:4px;padding:0 3px;margin-left:2px;}
  .gi-act{font-size:11px;font-weight:700;word-break:keep-all;line-height:1.2;}
  .gi-t{font-size:9px;font-weight:700;opacity:.85;white-space:nowrap;}
  .gitem.point{padding:0 5px;display:flex;align-items:center;box-shadow:none;}
  .gitem.point .gi-act{font-size:9px;line-height:1;}
  .gfree{position:absolute;border-radius:6px;background:repeating-linear-gradient(45deg,#eee9dd,#eee9dd 5px,#e6e0d2 5px,#e6e0d2 10px);box-sizing:border-box;display:flex;align-items:center;justify-content:center;z-index:1;}
  .gfree span{font-size:9px;color:#9a8f78;font-weight:700;}
  .now-line{position:absolute;left:0;right:0;height:0;border-top:2px solid #e0463e;z-index:5;}
  .now-dot{position:absolute;left:-3px;top:-4px;width:7px;height:7px;border-radius:50%;background:#e0463e;}
  /* 픽업 표시 (진하게 강조) */
  .bitem.pu{background:#f6d9c4;border-left-width:5px;}
  .bitem.pu .bt{color:#a84a1f;}
  .pu-tag{font-size:11px;}
  .car-badge{display:inline-block;margin-left:6px;font-size:11px;font-weight:700;color:#fff;background:var(--sojung);border-radius:999px;padding:2px 8px;vertical-align:middle;}
  .card.pickup{background:#f6d9c4;border-color:#d98a5a;}
  .pk-check{display:flex;align-items:center;gap:8px;margin-top:14px!important;font-size:14px;color:var(--ink)!important;cursor:pointer;}
  .pk-check input{width:auto!important;}
  .add-fab{position:fixed;right:18px;bottom:84px;z-index:35;background:var(--forest);color:#f3efe4;border:none;width:54px;height:54px;border-radius:50%;font-size:26px;box-shadow:0 8px 20px -8px rgba(31,58,46,.6);cursor:pointer;}
  .add-fab:active{transform:scale(.95);}
  .savebar{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--line);padding:12px 16px env(safe-area-inset-bottom,12px);display:flex;gap:10px;align-items:center;z-index:40;box-shadow:0 -8px 20px -16px rgba(0,0,0,.4);}
  .savebar .status{font-size:12px;color:#9a917c;flex:1;}
  .btn{border:none;border-radius:10px;padding:11px 18px;font-family:'Gowun Dodum';font-size:14px;cursor:pointer;font-weight:700;}
  .btn-primary{background:var(--forest);color:#f3efe4;}
  .btn-ghost{background:transparent;color:#9a917c;border:1px solid var(--line);}
  .modal-bg{position:fixed;inset:0;background:rgba(28,38,32,.45);z-index:60;display:none;align-items:flex-end;justify-content:center;}
  .modal-bg.show{display:flex;}
  .modal{background:var(--card);width:100%;max-width:680px;border-radius:18px 18px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom,0));animation:slideup .25s ease;}
  @keyframes slideup{from{transform:translateY(40px);opacity:.6;}to{transform:none;opacity:1;}}
  .modal h3{margin:0 0 14px;font-family:'Gowun Batang';font-size:18px;}
  .modal label{font-size:12px;color:#9a917c;display:block;margin:10px 0 4px;}
  .modal input,.modal select{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px;font-family:'Gowun Dodum';font-size:15px;background:#fff;color:var(--ink);}
  .seg{display:flex;gap:7px;flex-wrap:wrap;}
  .seg button{flex:1;min-width:60px;border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px;font-family:'Gowun Dodum';font-size:14px;cursor:pointer;color:var(--ink);}
  .seg button.on{color:#fff;border-color:transparent;}
  .seg button.on.p-s{background:var(--sojung);}
  .seg button.on.p-h{background:var(--heejung);}
  .seg button.on.p-m{background:var(--mina);}
  .seg button.on.p-b{background:var(--byounggon);}
  .row2{display:flex;gap:10px;}
  .row2>div{flex:1;}
  .modal-actions{display:flex;gap:10px;margin-top:18px;}
  .modal-actions .btn{flex:1;}
  .day-chips{display:flex;gap:6px;flex-wrap:wrap;}
  .day-chips button{flex:0 0 auto;width:38px;height:38px;border:1px solid var(--line);background:#fff;border-radius:9px;font-family:'Gowun Dodum';font-size:14px;cursor:pointer;color:var(--ink);}
  .day-chips button.on{background:var(--forest);color:#fff;border-color:var(--forest);}
  .btn-copy{width:100%;margin-top:10px;background:transparent;color:var(--forest);border:1px solid var(--forest);}
  .btn-copy:active{background:#eef2ee;}
  .btn-delete{width:100%;margin-top:10px;background:transparent;color:#c2683b;border:1px solid #e3b394;}
  .btn-delete:active{background:#faf0e8;}
  .setup{padding:40px 24px;max-width:520px;margin:0 auto;text-align:center;}
  .setup h2{font-family:'Gowun Batang';}
  .setup p{color:#6b6452;font-size:14px;text-align:left;line-height:1.7;}
  .setup input{width:100%;border:1px solid var(--line);border-radius:10px;padding:13px;font-size:14px;margin:14px 0;font-family:'Gowun Dodum';}
  .setup .btn{width:100%;}
  .overlay-msg{position:fixed;top:120px;left:50%;transform:translateX(-50%);background:var(--forest);color:#fff;padding:9px 18px;border-radius:999px;font-size:13px;z-index:50;opacity:0;transition:.3s;pointer-events:none;}
  .overlay-msg.show{opacity:1;}
</style>
</head>
<body>
<header>
  <div class="head-left">
    <p class="eyebrow"><span class="sync-dot off" id="syncDot"></span><span id="syncLabel">연결 안 됨</span></p>
    <h1>우리집 주간 스케줄</h1>
    <div class="legend">
      <span><i class="dot d-s"></i>소정</span>
      <span><i class="dot d-h"></i>희정</span>
      <span><i class="dot d-m"></i>민아</span>
      <span><i class="dot d-b"></i>병곤</span>
    </div>
  </div>
  <button class="profile" id="profileBtn" title="가족 사진">
    <img id="profileImg" alt="" style="display:none">
    <span id="profilePlus">＋</span>
  </button>
  <input type="file" id="profileFile" accept="image/*" style="display:none">
</header>

<div id="setup" class="setup" style="display:none">
  <h2>가족 공유 설정</h2>
  <p>처음 한 번만 설정하면 돼요. Apps Script 웹앱 주소를 붙여넣으세요. (가족은 이 주소가 이미 들어있는 링크를 받으면 설정 없이 바로 보여요.)</p>
  <input id="apiInput" placeholder="https://script.google.com/macros/s/..../exec">
  <button class="btn btn-primary" id="apiSave">연결하기</button>
</div>

<div id="app" style="display:none">
  <nav class="days" id="dayNav"></nav>
  <main id="main"></main>
  <button class="add-fab" id="fab" title="일정 추가">＋</button>
  <div class="savebar">
    <span class="status" id="status">☁ 가족과 실시간 공유 중</span>
    <button class="btn btn-ghost" id="shareBtn">공유링크</button>
    <button class="btn btn-primary" id="reloadBtn">새로고침</button>
  </div>
</div>

<div class="overlay-msg" id="toast"></div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">일정 추가</h3>
    <label id="dayLabel">요일</label>
    <div class="day-chips" id="mDayChips"></div>

  ['mon','heejung','13:30','','학교 하교',''],['mon','heejung','14:00','15:30','영어',''],['mon','heejung','17:00','','플라잉 요가',''],
  ['tue','sojung','14:20','','학교 하교',''],['tue','sojung','15:45','18:00','박윤 수학',''],
  ['tue','heejung','13:30','','학교 하교',''],['tue','heejung','14:30','','영어 종료',''],['tue','heejung','16:30','18:00','수학',''],

  ['thu','sojung','14:20','','학교 하교',''],['thu','sojung','15:45','18:00','박윤 수학',''],

const API_KEY='family_schedule_api';
let API='', items=[], current='all', editCtx=null, pickPerson='sojung';

// ---- API helpers ----
function getApiFromUrl(){
  const p=new URLSearchParams(location.search);
  return p.get('api')||'';
}
async function apiList(){
  const r=await fetch(API+'?action=list');
  const j=await r.json();
  if(j.ok)return j.items;
  throw new Error(j.error||'list fail');
}
async function apiPost(action,body){
  const r=await fetch(API+'?action='+action,{
    method:'POST',
    body:JSON.stringify(body||{}),
    headers:{'Content-Type':'text/plain;charset=utf-8'} // avoid preflight
  });
  return r.json();
}
function setSync(state){ // 'ok' | 'busy' | 'off'
  const d=document.getElementById('syncDot'),l=document.getElementById('syncLabel');
  d.className='sync-dot'+(state==='ok'?'':state==='busy'?' busy':' off');

}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600);}

// ---- boot ----
async function boot(){
  API=getApiFromUrl()||localStorage.getItem(API_KEY)||'';
  if(!API){document.getElementById('setup').style.display='block';return;}
  localStorage.setItem(API_KEY,API);
  document.getElementById('app').style.display='block';
  setPerson('sojung');
  loadPhoto();
  await refresh(true,true);

  setInterval(()=>refresh(false),15000);
}

// ---- 가족사진 ----
function showPhoto(src){
  const img=document.getElementById('profileImg'),plus=document.getElementById('profilePlus');
  if(src){img.src=src;img.style.display='block';plus.style.display='none';}
  else{img.style.display='none';plus.style.display='block';}
}
async function loadPhoto(){
  // 먼저 로컬 캐시로 즉시 표시, 그 뒤 서버값으로 갱신
  const cached=localStorage.getItem('family_photo');
  if(cached)showPhoto(cached);
  try{
    const r=await fetch(API+'?action=getmeta');
    const j=await r.json();
    if(j.ok&&j.photo){showPhoto(j.photo);localStorage.setItem('family_photo',j.photo);}
  }catch(e){}
}
document.getElementById('profileBtn').onclick=()=>document.getElementById('profileFile').click();
document.getElementById('profileFile').onchange=function(){
  const f=this.files&&this.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const im=new Image();
    im.onload=async()=>{
      // 정사각 썸네일로 축소 (200px) → 용량 줄이기
      const S=200,cv=document.createElement('canvas');cv.width=S;cv.height=S;
      const ctx=cv.getContext('2d');
      const side=Math.min(im.width,im.height);
      const sx=(im.width-side)/2,sy=(im.height-side)/2;
      ctx.drawImage(im,sx,sy,side,side,0,0,S,S);
      const data=cv.toDataURL('image/jpeg',0.8);
      showPhoto(data);localStorage.setItem('family_photo',data);
      setSync('busy');
      try{await apiPost('setmeta',{photo:data});setSync('ok');toast('가족사진 저장됨');}
      catch(err){setSync('off');toast('사진 저장 실패');}
    };
    im.src=e.target.result;
  };
  reader.readAsDataURL(f);
};
let lastSig='';
function itemsSig(arr){
  // 변경 감지용 간단 시그니처
  return arr.map(it=>it.id+'|'+it.day+'|'+it.person+'|'+it.start+'|'+it.end+'|'+it.act+'|'+it.loc+'|'+it.hw).sort().join('#');
}
async function refresh(seedIfEmpty, force){
  setSync('busy');
  try{
    const fresh=await apiList();
    if(seedIfEmpty && fresh.length===0){
      await apiPost('seed',{items:SEED});
      items=await apiList();
      toast('초기 일정을 시트에 저장했어요');
      lastSig=itemsSig(items);setSync('ok');render();return;
    }
    const sig=itemsSig(fresh);
    items=fresh;
    setSync('ok');
    // 데이터가 실제로 바뀌었거나, 강제 새로고침일 때만 다시 그림
    if(force || sig!==lastSig){lastSig=sig;render();}
  }catch(e){setSync('off');toast('연결 실패 — 주소 확인');}
}

document.getElementById('apiSave').onclick=()=>{
  const v=document.getElementById('apiInput').value.trim();
  if(!v.startsWith('http')){toast('올바른 주소를 입력하세요');return;}

function timelineFor(dayKey){return items.filter(it=>it.day===dayKey).slice().sort((a,b)=>(a.start||'').localeCompare(b.start||''));}
// "14:20" → 분 단위 숫자. 실패 시 null
function toMin(t){if(!t)return null;const m=(''+t).match(/(\d{1,2}):(\d{2})/);if(!m)return null;return parseInt(m[1])*60+parseInt(m[2]);}
function minToHM(v){const h=Math.floor(v/60),m=v%60;return ('0'+h).slice(-2)+':'+('0'+m).slice(-2);}
// 겹치는 일정들을 나란히 배치: 각 일정의 열 인덱스와 그 시점 동시 일정 수 계산
function assignColumns(arr){
  const colIndex=new Array(arr.length).fill(0);
  const colCount=new Array(arr.length).fill(1);
  for(let i=0;i<arr.length;i++){
    // i와 시간이 겹치는 일정들 모으기
    const overlap=[];
    for(let j=0;j<arr.length;j++){
      if(arr[j].s<arr[i].e&&arr[j].e>arr[i].s)overlap.push(j);
    }
    // 겹치는 그룹 내에서 i의 순번
    const used=new Set();
    overlap.forEach(j=>{if(j<i)used.add(colIndex[j]);});
    let c=0;while(used.has(c))c++;
    colIndex[i]=c;
    const cnt=overlap.length;
    overlap.forEach(j=>{colCount[j]=Math.max(colCount[j],cnt);});
    colCount[i]=Math.max(colCount[i],cnt);
  }
  return {colIndex,colCount};
}
// 한 사람의 하루 일정에서 일정-사이 빈틈 구하기 (첫~마지막 사이만)
function gapsFor(dayKey,personKey){
  const list=items.filter(it=>it.day===dayKey&&it.person===personKey)
    .map(it=>({s:toMin(it.start),e:toMin(it.end)||toMin(it.start),name:cleanAct(it.act)}))
    .filter(x=>x.s!=null).sort((a,b)=>a.s-b.s);
  const gaps=[];
  for(let i=0;i<list.length-1;i++){
    const endPrev=list[i].e, startNext=list[i+1].s;
    if(startNext-endPrev>=10){ // 10분 이상 표시
      gaps.push({person:personKey,start:endPrev,end:startNext,from:list[i].name,to:list[i+1].name});
    }
  }
  return gaps;
}
// 소정·희정 빈 시간을 어떤 학원 사이인지와 함께
function freeBanner(dayKey){
  const targets=[['sojung','소정','s'],['heejung','희정','h']];
  const isToday=(dayKey===todayKey());
  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();
  let rows='';
  targets.forEach(([pk,name,cls])=>{
    const gaps=gapsFor(dayKey,pk);
    rows+='<div class="free-block"><span class="free-who who-'+cls+'">'+name+'</span>';
    if(isToday){rows+='<span class="now-status">'+nowStatus(dayKey,pk,nowMin)+'</span>';}
    if(gaps.length===0){rows+='<span class="free-none">학원 사이 빈 시간 없음</span>';}
    else{
      rows+='<div class="free-gaps">'+gaps.map(g=>{
        const isNow=isToday&&nowMin>=g.start&&nowMin<g.end;
        return '<div class="free-gap'+(isNow?' gap-now':'')+'">'+
          '<span class="fg-time">'+minToHM(g.start)+'~'+minToHM(g.end)+' <em>'+gapLen(g.end-g.start)+'</em>'+(isNow?' <b>지금</b>':'')+'</span>'+
          '<span class="fg-between">'+escapeHtml(g.from||'일정')+' → '+escapeHtml(g.to||'일정')+'</span>'+
        '</div>';
      }).join('')+'</div>';
    }
    rows+='</div>';
  });
  const timeNow=isToday?'<span class="banner-clock">현재 '+minToHM(nowMin)+'</span>':'';
  return '<div class="free-banner"><div class="free-title">⏳ 학원 사이 빈 시간 (휴식)'+timeNow+'</div>'+rows+'</div>';
}
// 현재 시각 기준 그 사람의 상태 한 줄
function nowStatus(dayKey,pk,nowMin){
  const list=items.filter(it=>it.day===dayKey&&it.person===pk)
    .map(it=>({s:toMin(it.start),e:toMin(it.end)||toMin(it.start),name:cleanAct(it.act)}))
    .filter(x=>x.s!=null).sort((a,b)=>a.s-b.s);
  if(list.length===0)return '오늘 일정 없음';
  // 진행 중인 일정?
  for(const it of list){
    if(nowMin>=it.s&&nowMin<it.e&&it.e>it.s){
      return '🔵 지금 '+it.name+' 중 (~'+minToHM(it.e)+')';
    }
  }
  // 다음 일정?
  const next=list.find(it=>it.s>nowMin);
  if(next){
    const left=next.s-nowMin;
    return '⏰ 다음: '+next.name+' '+minToHM(next.s)+' ('+gapLen(left)+' 후)';
  }
  // 마지막 일정도 지남
  const last=list[list.length-1];
  if(nowMin<last.s)return '곧 시작';
  return '✅ 오늘 일정 종료';
}
function gapLen(min){const h=Math.floor(min/60),m=min%60;return (h?h+'시간':'')+(m?m+'분':'')||'0분';}
// 픽업 필요 여부: 내용에 '픽업' 마커가 있으면 true
function isPickup(it){return /픽업/.test((it.act||''));}
// 표시용: 픽업 마커 텍스트를 제거 (아이콘으로 대체하므로)
function cleanAct(a){return (a||'').replace(/\s*\(?픽업🚗?\)?/g,'').trim();}
function rowHtml(it){
  const p=PEOPLE[it.person]||{name:it.person,cls:'s'};
  const pu=isPickup(it);
  return '<div class="tl-row">'+
    '<div class="tl-time">'+escapeHtml(it.start||'')+(it.end?'<span class="end">~'+escapeHtml(it.end)+'</span>':'')+'</div>'+
    '<div class="tl-line"><span class="tl-dot dot-'+p.cls+'"></span></div>'+
    '<div class="tl-body"><div class="card '+p.cls+(pu?' pickup':'')+'" data-id="'+it.id+'">'+
      '<button class="del-btn">×</button>'+
      '<span class="who who-'+p.cls+'">'+p.name+'</span>'+
      (pu?'<span class="car-badge">🚗 픽업</span>':'')+
      '<div class="act">'+escapeHtml(cleanAct(it.act))+'</div>'+
      '<div class="loc-row"><span class="pin">📍</span><input class="loc-input" placeholder="장소 입력" value="'+escapeAttr(it.loc||'')+'"></div>'+
      (it.hw?'<div class="hw-row">📚 '+escapeHtml(it.hw)+'</div>':'')+
    '</div></div></div>';
}
// 단일 요일 격자 칼럼 HTML 생성 (전체보기·하루보기 공용)
function gridColumnHtml(d, startH, endH, PXMIN, showHeader){
  const today=todayKey();
  const gridH=(endH-startH)*60*PXMIN;
  const LANES=[['sojung','소정','s'],['heejung','희정','h']];
  let html='<div class="gcol'+(d.k===today?' today':'')+'">';
  if(showHeader){
    html+='<div class="gcol-h'+(d.k==='sat'?' sat':d.k==='sun'?' sun':'')+'">'+d.pill+'<span class="gd">'+dateForDay(d.k)+'</span></div>';
  }
  html+='<div class="lane-head"><span class="lh s">소정</span><span class="lh h">희정</span></div>';
  html+='<div class="gcol-body" style="height:'+gridH+'px">';
  for(let hh=startH;hh<endH;hh++){
    html+='<div class="gline" style="top:'+((hh-startH)*60*PXMIN)+'px"></div>';
  }
  if(d.k===today){
    const nowMin=new Date().getHours()*60+new Date().getMinutes();
    if(nowMin>=startH*60&&nowMin<=endH*60){
      html+='<div class="now-line" style="top:'+((nowMin-startH*60)*PXMIN)+'px"><span class="now-dot"></span></div>';
    }
  }
  html+='<div class="lane-div"></div>';
  const PT_H=13;
  LANES.forEach(([pk,nm,cls],laneI)=>{
    const leftPct=laneI*50;
    const list=items.filter(it=>it.day===d.k&&it.person===pk&&toMin(it.start)!=null)
      .map(it=>{const s=toMin(it.start);let e=toMin(it.end);const re=(e==null||e<=s)?s:e;if(e==null||e<=s)e=s+25;return {it,s,e,re,hasEnd:!!it.end};})
      .sort((a,b)=>a.s-b.s);
    for(let i=0;i<list.length-1;i++){
      const prev=list[i], dur=list[i+1].s-prev.re;
      if(dur>=10){
        const prevTop=(prev.s-startH*60)*PXMIN;
        const prevBottomPx=prev.hasEnd?prevTop+Math.max((prev.e-prev.s)*PXMIN,28):prevTop+PT_H;
        const reTopPx=(prev.re-startH*60)*PXMIN;
        const top=Math.max(reTopPx,prevBottomPx)+1;
        const hgt=(list[i+1].s-startH*60)*PXMIN-top;
        if(hgt>6){
          html+='<div class="gfree" style="top:'+top+'px;height:'+(hgt-1)+'px;left:calc('+leftPct+'% + 2px);width:calc(50% - 4px)">'+
            (hgt>12?'<span>'+gapLen(dur)+'</span>':'')+'</div>';
        }
      }
    }
    list.forEach(g=>{
      const it=g.it, pu=isPickup(it);
      const top=(g.s-startH*60)*PXMIN;
      const hgt=g.hasEnd?Math.max((g.e-g.s)*PXMIN,28):PT_H;
      html+='<div class="gitem '+cls+(pu?' pu':'')+(g.hasEnd?'':' point')+'" data-id="'+it.id+'" '+
        'style="top:'+top+'px;height:'+(hgt-2)+'px;left:calc('+leftPct+'% + 2px);width:calc(50% - 4px)">'+
        '<div class="gi-act">'+escapeHtml(cleanAct(it.act))+(pu?' <span class="gi-car">🚗</span>':'')+' <span class="gi-t">'+escapeHtml(it.start||'')+(it.end?'~'+escapeHtml(it.end):'')+'</span></div>'+
      '</div>';
    });
  });
  const extra=items.filter(it=>it.day===d.k&&(it.person==='mina'||it.person==='byounggon')&&toMin(it.start)!=null)
    .sort((a,b)=>(a.start||'').localeCompare(b.start||''));
  extra.forEach(it=>{
    const p=PEOPLE[it.person], top=(toMin(it.start)-startH*60)*PXMIN;
    html+='<div class="gitem '+p.cls+'" data-id="'+it.id+'" style="top:'+top+'px;height:24px;left:2px;width:calc(100% - 4px);opacity:.92;z-index:4">'+
      '<div class="gi-act" style="font-size:10px">'+p.name+' · '+escapeHtml(cleanAct(it.act))+'</div></div>';
  });
  html+='</div></div>';
  return html;
}
function gridRange(){
  let minM=24*60, maxM=0;
  items.forEach(it=>{
    const s=toMin(it.start), e=toMin(it.end)||(toMin(it.start)!=null?toMin(it.start)+30:null);
    if(s!=null){minM=Math.min(minM,s);maxM=Math.max(maxM,e||s+30);}
  });
  if(minM>=maxM){minM=13*60;maxM=19*60;}
  return {startH:Math.floor(minM/60), endH:Math.ceil(maxM/60)};
}
function render(){
  buildNav();
  const main=document.getElementById('main');main.innerHTML='';
  let html='';
  if(current==='hw'){
    html+='<div class="day-title">📚 이번 주 숙제<span class="en">HOMEWORK</span></div>';
    const hwItems=items.filter(it=>it.hw&&it.hw.trim())
      .slice().sort((a,b)=>{
        const da=DAYS.findIndex(d=>d.k===a.day),db=DAYS.findIndex(d=>d.k===b.day);
        if(da!==db)return da-db;
        return (a.start||'').localeCompare(b.start||'');
      });
    if(hwItems.length===0){
      html+='<div class="empty">— 등록된 숙제가 없습니다 —<br>일정을 눌러 숙제를 추가하세요</div>';
      main.innerHTML=html;return;
    }
    html+='<div class="hw-list">';
    hwItems.forEach(it=>{
      const p=PEOPLE[it.person]||{name:it.person,cls:'s'};
      const d=DAYS.find(x=>x.k===it.day)||{ko:''};
      html+='<div class="hw-card '+p.cls+'" data-id="'+it.id+'">'+
        '<div class="hw-top"><span class="who who-'+p.cls+'">'+p.name+'</span>'+
          '<span class="hw-meta">'+escapeHtml(d.ko)+' · '+escapeHtml(cleanAct(it.act))+'</span></div>'+
        '<div class="hw-text">📚 '+escapeHtml(it.hw)+'</div>'+
      '</div>';
    });
    html+='</div>';
    main.innerHTML=html;
    main.querySelectorAll('.hw-card').forEach(el=>{el.onclick=()=>openEdit(el.dataset.id);});
    return;
  }
  if(current==='all'){
    const {startH,endH}=gridRange();
    const PXMIN=1.9;
    const gridH=(endH-startH)*60*PXMIN;
    html+='<div class="board-hint">← 좌우로 밀어서 모든 요일 보기 · 회색=쉬는 시간</div>';
    html+='<div class="grid-wrap"><div class="grid" style="height:'+(gridH+58)+'px">';
    html+='<div class="grid-times"><div class="gt-head2"></div>';
    for(let hh=startH;hh<endH;hh++){
      html+='<div class="gt-hour" style="height:'+(60*PXMIN)+'px">'+('0'+hh).slice(-2)+'</div>';
    }
    html+='</div>';
    DAYS.forEach(d=>{ html+=gridColumnHtml(d,startH,endH,PXMIN,true); });
    html+='</div></div>';
    main.innerHTML=html;
    main.querySelectorAll('.gitem').forEach(el=>{el.onclick=()=>openEdit(el.dataset.id);});
    return;
  }
  {
    const d=DAYS.find(x=>x.k===current);
    html='<div class="day-title'+(current==='sat'?' sat':current==='sun'?' sun':'')+'">'+d.ko+' <span class="dtitle-date">'+dateForDay(current)+'</span><span class="en">'+d.en+'</span></div>';
    // 소정·희정 빈 시간 요약
    html+=freeBanner(current);
    const tl=timelineFor(current);
    if(tl.length===0){html+='<div class="empty">— 일정이 없습니다 —<br>＋ 버튼으로 추가하세요</div>';main.innerHTML=html;return;}
    // 격자형 (하루는 넓고 크게)
    const {startH,endH}=gridRange();
    const PXMIN=2.4;
    const gridH=(endH-startH)*60*PXMIN;
    html+='<div class="grid-wrap day-grid"><div class="grid" style="height:'+(gridH+24)+'px">';
    html+='<div class="grid-times"><div class="gt-head3"></div>';
    for(let hh=startH;hh<endH;hh++){
      html+='<div class="gt-hour" style="height:'+(60*PXMIN)+'px">'+('0'+hh).slice(-2)+'</div>';
    }
    html+='</div>';
    html+=gridColumnHtml(d,startH,endH,PXMIN,false);
    html+='</div></div>';
    main.innerHTML=html;
    main.querySelectorAll('.gitem').forEach(el=>{el.onclick=()=>openEdit(el.dataset.id);});
    return;
  }
  main.innerHTML=html;
  bindCards(main);
}
function bindCards(main){
  main.querySelectorAll('.card').forEach(card=>{
    const id=card.dataset.id;
    const it=items.find(x=>x.id===id);
    const inp=card.querySelector('.loc-input');
    inp.addEventListener('blur',async()=>{
      if(it.loc===inp.value)return;
      it.loc=inp.value;setSync('busy');
      await apiPost('update',it);setSync('ok');toast('장소 저장됨');
    });
    card.querySelector('.del-btn').onclick=async()=>{
      if(confirm('이 일정을 삭제할까요?')){
        setSync('busy');await apiPost('delete',{id});
        items=items.filter(x=>x.id!==id);setSync('ok');render();
      }
    };
    card.querySelector('.act').onclick=()=>openEdit(id);
    card.querySelector('.who').onclick=()=>openEdit(id);
  });
}
function setPerson(pk){pickPerson=pk;document.querySelectorAll('#segPerson button').forEach(b=>b.classList.toggle('on',b.dataset.p===pk));}
document.querySelectorAll('#segPerson button').forEach(b=>b.onclick=()=>setPerson(b.dataset.p));

let selectedDays=[]; // 모달에서 선택된 요일들

function buildDayChips(activeKeys, multi){
  const wrap=document.getElementById('mDayChips');
  wrap.innerHTML='';
  selectedDays=activeKeys.slice();
  DAYS.forEach(d=>{
    const b=document.createElement('button');
    b.textContent=d.pill;
    if(selectedDays.includes(d.k))b.classList.add('on');
    b.onclick=()=>{
      if(multi){
        if(selectedDays.includes(d.k))selectedDays=selectedDays.filter(k=>k!==d.k);
        else selectedDays.push(d.k);
      }else{
        selectedDays=[d.k];
        wrap.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
      }
      b.classList.toggle('on',selectedDays.includes(d.k));
    };
    wrap.appendChild(b);
  });
}

function openEdit(id){
  editCtx=id||null;
  const isNew=!id;
  document.getElementById('modalTitle').textContent=isNew?'일정 추가':'일정 수정';
  let it={person:'sojung',start:'',end:'',act:'',loc:'',day:'',hw:''};
  if(!isNew)it=items.find(x=>x.id===id)||it;
  // 요일 칩: 추가는 다중선택, 수정은 단일
  let defDay=it.day||(current==='all'||current==='hw'?todayKey():current);
  buildDayChips([defDay], isNew);
  document.getElementById('dayLabel').textContent=isNew?'요일 (여러 개 선택 가능)':'요일';
  setPerson(it.person||'sojung');
  document.getElementById('mStart').value=it.start||'';
  document.getElementById('mEnd').value=it.end||'';
  document.getElementById('mAct').value=cleanAct(it.act);
  document.getElementById('mLoc').value=it.loc||'';
  document.getElementById('mHw').value=it.hw||'';
  document.getElementById('mPickup').checked=!isNew&&isPickup(it);
  document.getElementById('mDelete').style.display=isNew?'none':'block';
  document.getElementById('mCopy').style.display=isNew?'none':'block';
  document.getElementById('modalBg').classList.add('show');
}
function closeModal(){document.getElementById('modalBg').classList.remove('show');editCtx=null;}
document.getElementById('fab').onclick=()=>openEdit(null);
document.getElementById('mCancel').onclick=closeModal;
document.getElementById('mDelete').onclick=async()=>{
  if(!editCtx)return;
  if(!confirm('이 일정을 삭제할까요?'))return;
  const id=editCtx;
  setSync('busy');
  await apiPost('delete',{id});
  items=items.filter(x=>x.id!==id);
  setSync('ok');closeModal();render();toast('삭제됨');
};
document.getElementById('modalBg').onclick=e=>{if(e.target.id==='modalBg')closeModal();};
document.getElementById('mSave').onclick=async()=>{
  const days=selectedDays.slice();
  const start=document.getElementById('mStart').value;
  const end=document.getElementById('mEnd').value;
  let act=document.getElementById('mAct').value.trim();
  const loc=document.getElementById('mLoc').value.trim();
  const hw=document.getElementById('mHw').value.trim();
  const wantPickup=document.getElementById('mPickup').checked;
  act=act.replace(/\s*\(?픽업🚗?\)?/g,'').trim();
  if(wantPickup)act=act+(act?' ':'')+'(픽업🚗)';
  if(!start&&!act){closeModal();return;}
  if(days.length===0){toast('요일을 선택하세요');return;}
  setSync('busy');
  if(editCtx){
    // 수정: 단일 요일 (칩이 단일선택)
    const it=items.find(x=>x.id===editCtx);
    Object.assign(it,{person:pickPerson,start,end,act,loc,day:days[0],hw});
    await apiPost('update',it);
  }else{
    // 추가: 선택된 모든 요일에 생성
    for(const day of days){
      const body={day,person:pickPerson,start,end,act,loc,hw};
      const j=await apiPost('add',body);
      if(j.ok)items.push(Object.assign({...body},{id:j.id}));
    }
  }
  setSync('ok');closeModal();render();toast(days.length>1?days.length+'개 요일에 저장됨':'저장됨');
};

// 복사: 현재 수정 중인 일정을 다른 요일들로 복제
document.getElementById('mCopy').onclick=async()=>{
  if(!editCtx)return;
  const src=items.find(x=>x.id===editCtx);if(!src)return;
  const others=DAYS.filter(d=>d.k!==src.day);
  const labels=others.map((d,i)=>(i+1)+') '+d.ko).join('\n');
  const ans=prompt('어느 요일로 복사할까요? 번호를 쉼표로 입력 (예: 1,3,5)\n\n'+labels);
  if(!ans)return;
  const picks=ans.split(',').map(s=>parseInt(s.trim())-1).filter(i=>i>=0&&i<others.length);
  if(picks.length===0){toast('잘못된 입력');return;}
  setSync('busy');
  for(const i of picks){
    const body={day:others[i].k,person:src.person,start:src.start,end:src.end,act:src.act,loc:src.loc,hw:src.hw};
    const j=await apiPost('add',body);
    if(j.ok)items.push(Object.assign({...body},{id:j.id}));
  }
  setSync('ok');closeModal();render();toast(picks.length+'개 요일로 복사됨');
};

document.getElementById('reloadBtn').onclick=()=>refresh(false,true);
document.getElementById('shareBtn').onclick=()=>{
  const link=location.origin+location.pathname+'?api='+encodeURIComponent(API);
  if(navigator.share){navigator.share({title:'우리집 스케줄',text:'우리 가족 주간 스케줄이야. 이 링크로 열면 바로 보여:',url:link}).catch(()=>copyText(link));}
  else copyText(link);
};
function copyText(t){navigator.clipboard.writeText(t).then(()=>toast('공유 링크 복사됨')).catch(()=>alert(t));}
function escapeHtml(s){return(s+'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function escapeAttr(s){return(s+'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function todayKey(){const map=['sun','mon','tue','wed','thu','fri','sat'];return map[new Date().getDay()];}
// 이번 주(월~일)에서 요일키에 해당하는 날짜를 "M/D"로 반환
function dateForDay(dayKey){
  try{
    const order=['mon','tue','wed','thu','fri','sat','sun'];
    const idx=order.indexOf(dayKey);
    if(idx<0)return '';
    const now=new Date();
    const dow=now.getDay();
    const offsetToMon=(dow===0?-6:1-dow);
    const mon=new Date(now);mon.setDate(now.getDate()+offsetToMon);
    const d=new Date(mon);d.setDate(mon.getDate()+idx);
    return (d.getMonth()+1)+'/'+d.getDate();
  }catch(e){return '';}
}
// 기본은 전체 보드. (요일 탭을 누르면 하루 보기로 전환)
boot();
